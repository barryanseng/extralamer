kind = "mobile"
previewPath = "/"
title = "Wayfinder"
version = "1.0.0"
id = "artifacts/blind-maze"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 21962

[services.development]
run = "pnpm --filter @workspace/blind-maze run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/blind-maze", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/blind-maze", "run", "serve" ]

[services.env]
PORT = "21962"
BASE_PATH = "/"
